repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check with Fix
        entry: ruff check --fix
        language: python
        types: [python]
        additional_dependencies: [ruff]

      - id: ruff-format
        name: Ruff Format
        entry: ruff format
        language: python
        types: [python]
        additional_dependencies: [ruff]
  - repo: local
    hooks:
      - id: run-tests
        name: Run Tests
        entry: pytest tests/ --maxfail=1 --disable-warnings
        language: system
        types: [python]
